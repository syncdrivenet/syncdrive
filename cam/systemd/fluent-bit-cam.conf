# Fluent Bit configuration for SyncDrive Camera Node
# Place in /etc/fluent-bit/fluent-bit.conf

[SERVICE]
    Flush        5
    Daemon       Off
    Log_Level    info

# Camera logs (JSON format)
[INPUT]
    Name         tail
    Path         /data/logs/cam/*.log
    Tag          cam
    Parser       json
    Refresh_Interval 5

# Send to Loki on VPS
[OUTPUT]
    Name         loki
    Match        *
    Host         170.64.228.23
    Port         3100
    Labels       job=syncdrive
    Label_Keys   $node,$component,$level
    Remove_Keys  ts
    Line_Format  json

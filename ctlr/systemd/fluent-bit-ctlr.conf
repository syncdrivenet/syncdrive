# Fluent Bit configuration for SyncDrive Controller

[SERVICE]
    Flush        5
    Daemon       Off
    Log_Level    info
    Parsers_File parsers.conf

# Controller logs (JSON format)
[INPUT]
    Name         tail
    Path         /data/logs/ctlr/*.log
    Tag          ctlr
    Parser       json
    Refresh_Interval 5
    Read_from_Head true

# iOS app logs (JSON format)
[INPUT]
    Name         tail
    Path         /data/logs/ios/*.log
    Tag          ios
    Parser       json
    Refresh_Interval 5

# Camera logs via syslog (from Pi Zeros rsyslog forward)
[INPUT]
    Name         syslog
    Tag          cam
    Mode         tcp
    Listen       0.0.0.0
    Port         5514
    Parser       syslog-rfc5424

# Send to Loki on VPS
[OUTPUT]
    Name         loki
    Match        *
    Host         170.64.228.23
    Port         3100
    Labels       job=syncdrive
    Label_Keys   $node,$component,$level
    Remove_Keys  ts
    Line_Format  json

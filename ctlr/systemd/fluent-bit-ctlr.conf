# Fluent Bit configuration for SyncDrive Controller
# Place in /etc/fluent-bit/fluent-bit.conf or include from main config

[SERVICE]
    Flush        5
    Daemon       Off
    Log_Level    info

# Controller logs (JSON format)
[INPUT]
    Name         tail
    Path         /data/logs/ctlr/*.log
    Tag          ctlr
    Parser       json
    Refresh_Interval 5

# iOS app logs (JSON format)
[INPUT]
    Name         tail
    Path         /data/logs/ios/*.log
    Tag          ios
    Parser       json
    Refresh_Interval 5

# Send to Loki on VPS
[OUTPUT]
    Name         loki
    Match        *
    Host         170.64.228.23
    Port         3100
    Labels       job=syncdrive
    Label_Keys   $node,$component,$level
    Remove_Keys  ts
    Line_Format  json

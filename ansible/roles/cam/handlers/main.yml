---
- name: Restart camera services
  become: true
  systemd:
    name: "{{ item }}"
    state: restarted
    daemon_reload: true
  loop:
    - syncdrive-recorder
    - syncdrive-uploader
    - syncdrive-cam-api

- name: Restart fluent-bit
  become: true
  systemd:
    name: fluent-bit
    state: restarted
